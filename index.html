<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retirada de Kits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <p class="eyebrow">VIDA CORRIDA ASSESSORIA</p>
        <h1>Retirada de Kits</h1>
        <p class="hero-text">
          Os kits serão entregues na tenda da VC no local da prova!
        </p>
      </div>

      <div class="panel form-panel">
        <h2>Novo cadastro</h2>

        <form id="kit-form" novalidate>
          <label class="field">
            <span>Nome Completo</span>
            <input id="fullName" name="fullName" type="text" placeholder="Digite o nome do atleta" required>
          </label>

          <label class="field">
            <span>Distância</span>
            <select id="distance" name="distance" required>
              <option value="">Selecione</option>
              <option value="3km">3km</option>
              <option value="5km">5km</option>
              <option value="10km">10km</option>
              <option value="21km">21km</option>
            </select>
          </label>

          <label class="field">
            <span>Tamanho da camisa</span>
            <select id="shirtSize" name="shirtSize" required>
              <option value="">Selecione</option>
              <option value="PP">PP</option>
              <option value="P">P</option>
              <option value="M">M</option>
              <option value="G">G</option>
              <option value="GG">GG</option>
            </select>
          </label>

          <div class="actions">
            <button type="submit" class="primary-button">Enviar</button>
            <button type="button" id="export-button" class="secondary-button">Exportar CSV</button>
          </div>

          <p id="form-message" class="form-message" aria-live="polite"></p>
        </form>
      </div>
    </section>

    <section class="panel overview">
      <div class="overview-header">
        <div>
          <p class="eyebrow">Lista atual</p>
          <h2>Atletas VC Cadastrados</h2>
        </div>
        <span id="total-count" class="count-badge">0 inscritos</span>
      </div>

      <div id="distance-groups" class="distance-groups" aria-live="polite"></div>
    </section>

    <section class="panel table-panel">
      <div class="overview-header">
        <div>
          <p class="eyebrow">Tabela completa</p>
          <h2>VIDA CORRIDA</h2>
        </div>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Distância</th>
              <th>Camisa</th>
            </tr>
          </thead>
          <tbody id="entries-table-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
